<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Health Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #74ABE2, #5563DE);
            color: #fff;
            text-align: center;
            padding: 30px;
            margin: 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            width: 250px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .cpu { color: #FF6B6B; }
        .memory { color: #FFD93D; }
        .disk { color: #6BCB77; }
        .system { color: #4D96FF; }

        p {
            font-size: 1.2em;
            margin: 5px 0;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <h1>🖥 System Health Monitor</h1>
    <div class="container">
        <div class="card cpu">
            <h2>CPU Usage</h2>
            <p>{{ info.cpu_usage }}%</p>
        </div>
        <div class="card memory">
            <h2>Memory Usage</h2>
            <p>{{ info.memory_usage }}%</p>
        </div>
        <div class="card disk">
            <h2>Disk Usage</h2>
            <p>{{ info.disk_usage }}%</p>
        </div>
        <div class="card system">
            <h2>System Info</h2>
            <p>{{ info.platform }} ({{ info.architecture }})</p>
            <p>{{ info.platform_version }}</p>
            <p>Time: {{ info.time }}</p>
        </div>
    </div>
    <div class="footer">
        &copy; {{ info.time.split(' ')[0] }} System Monitor
    </div>
</body>
</html>
